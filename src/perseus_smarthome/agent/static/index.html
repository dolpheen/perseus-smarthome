<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perseus Smart Home</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 0.75rem 1rem;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    #status {
      display: inline-block;
      margin-left: 0.5rem;
      font-size: 0.75rem;
      font-weight: 400;
      color: #888;
    }

    #transcript {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .msg {
      max-width: 80%;
      padding: 0.5rem 0.75rem;
      border-radius: 0.5rem;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg-user {
      align-self: flex-end;
      background: #0f3460;
    }

    .msg-agent {
      align-self: flex-start;
      background: #16213e;
      border: 1px solid #0f3460;
    }

    .msg-tool {
      align-self: flex-start;
      background: #0d1b2a;
      border: 1px solid #1b4332;
      font-size: 0.8rem;
      color: #90caf9;
      cursor: pointer;
    }

    .msg-tool summary {
      list-style: none;
      outline: none;
    }

    .msg-tool summary::before {
      content: "▶ ";
      font-size: 0.7rem;
    }

    details[open] > summary::before {
      content: "▼ ";
    }

    .msg-tool pre {
      margin-top: 0.4rem;
      padding: 0.4rem;
      background: #0a1628;
      border-radius: 0.25rem;
      overflow-x: auto;
      color: #b2dfdb;
    }

    .msg-error {
      align-self: center;
      background: #3b1a1a;
      border: 1px solid #7b2d2d;
      color: #ff8a80;
      font-size: 0.85rem;
    }

    #form {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      background: #16213e;
      border-top: 1px solid #0f3460;
    }

    #input {
      flex: 1;
      padding: 0.5rem 0.75rem;
      border-radius: 0.5rem;
      border: 1px solid #0f3460;
      background: #0d1b2a;
      color: #e0e0e0;
      font-size: 1rem;
    }

    #input:focus { outline: none; border-color: #4a90d9; }

    button {
      padding: 0.5rem 1.25rem;
      border-radius: 0.5rem;
      border: none;
      background: #4a90d9;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
    }

    button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    🏠 Perseus Smart Home
    <span id="status">connecting…</span>
  </header>

  <div id="transcript" role="log" aria-live="polite"></div>

  <form id="form">
    <input
      id="input"
      type="text"
      placeholder="Ask the home assistant…"
      autocomplete="off"
      disabled
    >
    <button id="send-btn" type="submit" disabled>Send</button>
  </form>

  <script>
    const wsUrl = (location.protocol === "https:" ? "wss:" : "ws:") + "//" + location.host + "/chat";
    const transcript = document.getElementById("transcript");
    const statusEl  = document.getElementById("status");
    const form      = document.getElementById("form");
    const input     = document.getElementById("input");
    const sendBtn   = document.getElementById("send-btn");

    let ws;
    // Pending tool_call frames keyed by tool name, in arrival order.
    // Each entry is {callFrame, el} so we can pair each result with the
    // correct call even when the same tool is invoked multiple times per turn.
    const pendingToolCalls = new Map(); // name → [{callFrame, el}, ...]

    function setStatus(text, color) {
      statusEl.textContent = text;
      statusEl.style.color = color || "#888";
    }

    function appendMsg(el) {
      transcript.appendChild(el);
      transcript.scrollTop = transcript.scrollHeight;
    }

    function makeDiv(cls, text) {
      const d = document.createElement("div");
      d.className = "msg " + cls;
      d.textContent = text;
      return d;
    }

    function makeToolFrame(callFrame, resultFrame) {
      const details = document.createElement("details");
      details.className = "msg msg-tool";

      const label = resultFrame
        ? (resultFrame.ok ? "✓ " : "✗ ") + callFrame.name
        : "⏳ " + callFrame.name;

      const summary = document.createElement("summary");
      summary.textContent = label;
      details.appendChild(summary);

      const pre = document.createElement("pre");
      const argsStr = JSON.stringify(callFrame.args, null, 2);
      const body = resultFrame
        ? "args:\n" + argsStr + "\n\nresult:\n" + JSON.stringify(resultFrame, null, 2)
        : "args:\n" + argsStr;
      pre.textContent = body;
      details.appendChild(pre);
      return details;
    }

    function connect() {
      ws = new WebSocket(wsUrl);

      ws.addEventListener("open", () => {
        setStatus("connected", "#81c784");
        input.disabled  = false;
        sendBtn.disabled = false;
        input.focus();
      });

      ws.addEventListener("close", () => {
        setStatus("disconnected — reconnecting…", "#e57373");
        input.disabled  = true;
        sendBtn.disabled = true;
        setTimeout(connect, 2000);
      });

      ws.addEventListener("error", () => {
        setStatus("connection error", "#e57373");
      });

      ws.addEventListener("message", (ev) => {
        let frame;
        try { frame = JSON.parse(ev.data); } catch { return; }

        if (frame.type === "agent_turn") {
          appendMsg(makeDiv("msg-agent", frame.content));

        } else if (frame.type === "tool_call") {
          // Insert a pending placeholder and track it in the per-name queue.
          const el = makeToolFrame(frame, null);
          el.dataset.toolName = frame.name;
          appendMsg(el);
          if (!pendingToolCalls.has(frame.name)) pendingToolCalls.set(frame.name, []);
          pendingToolCalls.get(frame.name).push({ callFrame: frame, el });

        } else if (frame.type === "tool_result") {
          // Dequeue the oldest pending call with this tool name and replace it.
          const queue = pendingToolCalls.get(frame.name) || [];
          const entry = queue.shift();
          if (queue.length === 0) pendingToolCalls.delete(frame.name);
          const callFrame = entry ? entry.callFrame : { name: frame.name, args: {} };
          const newEl = makeToolFrame(callFrame, frame);
          newEl.dataset.toolName = frame.name;
          if (entry) {
            entry.el.replaceWith(newEl);
          } else {
            appendMsg(newEl);
          }

        } else if (frame.type === "agent_done") {
          // Turn complete; re-enable input for the next message.
          sendBtn.disabled = false;
          input.disabled   = false;
          input.focus();

        } else if (frame.type === "error") {
          if (frame.code === "session_superseded") {
            setStatus("session taken by another window", "#ffb74d");
            appendMsg(makeDiv("msg-error", "⚠ Your session was taken by a newer connection."));
          } else {
            appendMsg(makeDiv("msg-error", "Error [" + (frame.code || "?") + "]: " + (frame.message || "")));
            // Re-enable input so the operator can retry.
            sendBtn.disabled = false;
            input.disabled   = false;
            input.focus();
          }
        }
      });
    }

    form.addEventListener("submit", (ev) => {
      ev.preventDefault();
      const text = input.value.trim();
      if (!text || ws.readyState !== WebSocket.OPEN) return;
      appendMsg(makeDiv("msg-user", text));
      ws.send(JSON.stringify({ type: "user_turn", content: text }));
      input.value = "";
      sendBtn.disabled = true;
      input.disabled   = true;
    });

    connect();
  </script>
</body>
</html>
