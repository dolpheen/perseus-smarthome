name: Copilot Setup Steps

# Pre-installs the Python toolchain and project dependencies inside the
# GitHub Copilot coding agent's sandbox BEFORE its firewall locks down.
# Without this, Copilot's `uv sync` was DNS-blocked from
# `releases.astral.sh` on PRs #18 and #21.
#
# Job MUST be named `copilot-setup-steps` and the file MUST live at this
# exact path; the agent looks them up by name.

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync
