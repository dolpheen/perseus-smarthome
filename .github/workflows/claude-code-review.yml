name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: claude-review-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Bot-authored PRs can't exchange OIDC for an App token because the
          # actor lacks write access; fall back to GITHUB_TOKEN only in that
          # case so human PRs keep claude[bot] attribution.
          github_token: ${{ github.event.pull_request.user.type == 'Bot' && secrets.GITHUB_TOKEN || '' }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: |
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }} --comment

            Apply CLAUDE.md strictly. Review as a findings-first reviewer:
            prioritize correctness, safety, security, reliability, contract
            compatibility, SDD/spec alignment, and missing acceptance tests.
            Do not spend comments on style or unrelated refactors.
          additional_permissions: |
            actions: read
          claude_args: >-
            --model claude-opus-4-7
            --allowedTools "Read,Glob,Grep,Bash(gh pr *),Bash(gh issue *),Bash(gh run *),Bash(git log *),Bash(git diff *),Bash(git show *),Bash(git status *),Bash(gh api *),Bash(ls *),Bash(wc *),Bash(cat *)"
          allowed_bots: '*'

      - name: Upload Claude execution output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-execution-output
          path: ${{ runner.temp }}/claude-execution-output.json
