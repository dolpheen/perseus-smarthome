name: Auto-merge

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, labeled, unlabeled]
  pull_request_review:
    types: [submitted]
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  # Manual re-trigger after a maintainer resolves a Copilot review thread.
  # GitHub Actions does not support `pull_request_review_thread` as a workflow
  # trigger (it exists only as a webhook event); the prior config tried it and
  # failed schema validation, which silently disabled the entire workflow for
  # all PRs. With no thread-resolution event available, the supported way to
  # re-evaluate auto-merge after marking Copilot threads Resolved is one of:
  # add/remove a label, push an empty commit, or run this workflow manually.
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to re-evaluate'
        required: true
        type: string

permissions:
  pull-requests: write
  contents: write
  issues: read
  checks: read
  statuses: read
  actions: read

concurrency:
  # All trigger types resolve to a head ref: pull_request* events carry
  # pull_request.head.ref, workflow_run carries workflow_run.head_branch,
  # workflow_dispatch carries inputs.pr_number (which we map to a branch via
  # the Resolve PR number step below; for grouping, the PR number alone is a
  # stable key). Using one of these keeps every auto-merge job for the same
  # PR in the same group regardless of which event fired it, avoiding the
  # prior split where workflow_run used head_sha and pull_request* used the
  # PR number — two runs for the same PR could race in parallel, last-
  # writer-wins.
  group: auto-merge-${{ github.event.pull_request.head.ref || github.event.workflow_run.head_branch || github.event.inputs.pr_number }}
  cancel-in-progress: false

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          case "${{ github.event_name }}" in
            pull_request|pull_request_review)
              echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
              ;;
            workflow_run)
              if [[ "${{ github.event.workflow_run.conclusion }}" != "success" ]]; then
                echo "Source workflow conclusion was ${{ github.event.workflow_run.conclusion }}; nothing to do"
                echo "number=" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              sha="${{ github.event.workflow_run.head_sha }}"
              num=$(gh api "repos/$REPO/commits/$sha/pulls" --jq '.[] | select(.state=="open") | .number' | head -1)
              echo "number=${num:-}" >> "$GITHUB_OUTPUT"
              ;;
            workflow_dispatch)
              echo "number=${{ github.event.inputs.pr_number }}" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Decide whether to merge
        id: gate
        if: steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          opt_out_labels=("critical" "needs-manual-verification" "do-not-merge")
          required_checks=("pytest")

          pr_data=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json state,isDraft,labels,mergeable,mergeStateStatus)
          state=$(jq -r '.state' <<<"$pr_data")
          is_draft=$(jq -r '.isDraft' <<<"$pr_data")

          if [[ "$state" != "OPEN" || "$is_draft" == "true" ]]; then
            echo "PR not eligible: state=$state, draft=$is_draft"
            echo "merge=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          for label in $(jq -r '.labels[].name' <<<"$pr_data"); do
            for opt in "${opt_out_labels[@]}"; do
              if [[ "$label" == "$opt" ]]; then
                echo "PR has opt-out label: $label"
                echo "merge=false" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            done
          done

          owner="${REPO%/*}"
          name="${REPO#*/}"
          if ! issue_labels=$(gh api graphql -f query="
            query { repository(owner:\"$owner\", name:\"$name\") {
              pullRequest(number:$PR_NUMBER) {
                closingIssuesReferences(first:10) {
                  nodes { labels(first:30) { nodes { name } } }
                }
              }
            }}" --jq '.data.repository.pullRequest.closingIssuesReferences.nodes[].labels.nodes[].name'); then
            echo "GraphQL call for linked-issue labels failed; failing closed"
            echo "merge=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          while IFS= read -r label; do
            [[ -z "$label" ]] && continue
            for opt in "${opt_out_labels[@]}"; do
              if [[ "$label" == "$opt" ]]; then
                echo "Linked issue has opt-out label: $label"
                echo "merge=false" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            done
          done <<<"$issue_labels"

          checks=$(gh pr checks "$PR_NUMBER" --repo "$REPO" --json name,bucket || true)
          if [[ -z "$checks" || "$checks" == "[]" ]]; then
            echo "Could not read check status (got: '$checks')"
            echo "merge=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          for required in "${required_checks[@]}"; do
            bucket=$(jq -r --arg n "$required" '[.[] | select(.name==$n) | .bucket] | last // "missing"' <<<"$checks")
            if [[ "$bucket" != "pass" ]]; then
              echo "Required check '$required' is '$bucket', not merging"
              echo "merge=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          # Gate on unresolved copilot-pull-request-reviewer[bot] inline
          # review threads. Copilot's reviewer surfaces real defects outside
          # normal pytest coverage (e.g. PR #36's WorkingDirectory mismatch);
          # leaving its comments unaddressed at merge time silently buries
          # that signal. Block until every Copilot thread on the PR is marked
          # Resolved by a maintainer.
          # Fail-closed on every error path: GraphQL failure, paginated
          # overflow beyond first:100 threads, or any malformed payload.
          if ! threads_json=$(gh api graphql -f query="
            query { repository(owner:\"$owner\", name:\"$name\") {
              pullRequest(number:$PR_NUMBER) {
                reviewThreads(first:100) {
                  pageInfo { hasNextPage }
                  nodes {
                    isResolved
                    comments(first:1) { nodes { author { login } } }
                  }
                }
              }
            }}"); then
            echo "GraphQL call for review threads failed; failing closed"
            echo "merge=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          has_next=$(jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.hasNextPage // true' <<<"$threads_json")
          if [[ "$has_next" == "true" ]]; then
            echo "PR has more than 100 review threads; failing closed (raise the first:N cap or paginate)"
            echo "merge=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Null-guard the author lookup so a thread with empty
          # comments.nodes (API-created or edited-then-deleted edge case)
          # does not blow up the jq filter under set -euo pipefail.
          unresolved=$(jq '
            [.data.repository.pullRequest.reviewThreads.nodes[]
             | select(.isResolved == false)
             | select((.comments.nodes[0].author.login // "") == "copilot-pull-request-reviewer")
            ] | length' <<<"$threads_json")
          if [[ "$unresolved" -gt 0 ]]; then
            echo "PR has $unresolved unresolved copilot-pull-request-reviewer thread(s); not merging"
            echo "merge=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "All conditions met"
          echo "merge=true" >> "$GITHUB_OUTPUT"

      - name: Merge
        if: steps.gate.outputs.merge == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr merge "$PR_NUMBER" --repo "$REPO" --squash --delete-branch
